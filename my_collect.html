<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-4">
    <h3 class="text-main mb-4">我的收藏</h3>
    <div class="row" id="collect-box"></div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    let loginUser = localStorage.getItem("loginUser") ? JSON.parse(localStorage.getItem("loginUser")) : null;
    if(!loginUser) location.href="login.html";
    function renderCollect(){
        let collectIds = getCollect();
        let allGoods = getGoodsList();
        let collectList = allGoods.filter(item=>collectIds.includes(item.id));
        let html = "";
        if(collectList.length===0){
            html = "<p>暂无收藏商品</p>";
        }else{
            collectList.forEach(item=>{
                html += `
                <div class="col-md-4 mb-4">
                    <div class="card goods-card">
                        <img src="${item.img}" height="160">
                        <div class="card-body">
                            <h6>${item.title}</h6>
                            <p class="goods-price">¥${item.price}</p>
                        </div>
                        <div class="card-footer">
                            <a href="goods_detail.html?id=${item.id}" class="btn btn-sm btn-main w-100">查看商品</a>
                        </div>
                    </div>
                </div>`
            })
        }
        $("#collect-box").html(html);
    }
    renderCollect();
</script>
</body>
</html>
