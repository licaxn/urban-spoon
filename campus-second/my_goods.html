<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的发布</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-4">
    <h3 class="text-main mb-4">我的发布商品</h3>
    <div class="row" id="my-goods-box"></div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    let loginUser = localStorage.getItem("loginUser") ? JSON.parse(localStorage.getItem("loginUser")) : null;
    if(!loginUser){
        location.href="login.html";
    }
    function renderMyGoods(){
        let all = getGoodsList();
        let myList = all.filter(item=>item.sellerId == loginUser.id);
        let html = "";
        if(myList.length===0){
            html = "<p>暂无发布商品，<a href='publish.html'>去发布</a></p>";
        }else{
            myList.forEach(item=>{
                html += `
                <div class="col-md-4 mb-4">
                    <div class="card goods-card">
                        <img src="${item.img}" height="160">
                        <div class="card-body">
                            <h6>${item.title}</h6>
                            <p class="goods-price">¥${item.price}</p>
                        </div>
                        <div class="card-footer d-flex gap-2">
                            <button class="btn btn-sm btn-danger del-btn flex-1" data-id="${item.id}">删除</button>
                            <a href="goods_detail.html?id=${item.id}" class="btn btn-sm btn-main flex-1">查看</a>
                        </div>
                    </div>
                </div>`
            })
        }
        $("#my-goods-box").html(html);
    }
    renderMyGoods();
    // 删除商品
    $("body").on("click",".del-btn",function(){
        let id = $(this).data("id");
        let all = getGoodsList();
        all = all.filter(item=>item.id != id);
        saveGoodsList(all);
        renderMyGoods();
    })
</script>
</body>
</html>
