<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情-校园淘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-5">
    <div class="row" id="detail-box"></div>
    <hr class="my-5">
    <h4>留言咨询</h4>
    <textarea id="msg-content" class="form-control mb-3" rows="3" placeholder="写下你的问题"></textarea>
    <button class="btn btn-main" id="send-msg">提交留言</button>
    <div class="mt-4" id="msg-list"></div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    let goodsId = new URL(location.href).searchParams.get("id");
    let goodsAll = getGoodsList();
    let currGoods = goodsAll.find(item=>item.id==goodsId);
    let loginUser = localStorage.getItem("loginUser") ? JSON.parse(localStorage.getItem("loginUser")) : null;

    function renderDetail(){
        if(!currGoods){
            $("#detail-box").html("<p>商品不存在</p>");
            return;
        }
        let collectArr = getCollect();
        let isCol = collectArr.includes(currGoods.id);
        let btnText = isCol ? "已收藏" : "收藏商品";
        let btnClass = isCol ? "btn btn-danger" : "btn btn-outline-danger";
        let html = `
        <div class="col-md-5">
            <img src="${currGoods.img}" class="w-100 rounded">
        </div>
        <div class="col-md-7">
            <h2>${currGoods.title}</h2>
            <p class="goods-price fs-3">售价：¥${currGoods.price}</p>
            <p>分类：<span class="badge bg-secondary">${currGoods.cate}</span></p>
            <p>成色：${currGoods.quality}</p>
            <p>卖家：${currGoods.sellerName}</p>
            <div class="mt-4">
                <button class="${btnClass}" id="collect-btn" data-id="${currGoods.id}">${btnText}</button>
            </div>
            <div class="mt-4">
                <h5>商品描述</h5>
                <p>${currGoods.desc}</p>
            </div>
        </div>`;
        $("#detail-box").html(html);
    }
    renderDetail();

    // 收藏切换
    $("body").on("click","#collect-btn",function(){
        if(!loginUser){
            alert("请先登录！");
            location.href="login.html";
            return;
        }
        let cid = $(this).data("id");
        let arr = getCollect();
        let idx = arr.indexOf(cid);
        if(idx>-1){
            arr.splice(idx,1);
        }else{
            arr.push(cid);
        }
        saveCollect(arr);
        renderDetail();
    })

    // 留言功能
    function renderMsg(){
        let msgAll = localStorage.getItem("msg") ? JSON.parse(localStorage.getItem("msg")) : [];
        let filterMsg = msgAll.filter(m=>m.goodsId==goodsId);
        let html = "";
        filterMsg.forEach(m=>{
            html += `<div class="border p-2 mb-2 rounded"><b>${m.user}</b>：${m.content}</div>`
        })
        $("#msg-list").html(html);
    }
    renderMsg();
    $("#send-msg").click(function(){
        if(!loginUser){
            alert("请登录");
            location.href="login.html";
            return;
        }
        let content = $("#msg-content").val().trim();
        if(!content){
            alert("留言不能为空");
            return;
        }
        let msgAll = localStorage.getItem("msg") ? JSON.parse(localStorage.getItem("msg")) : [];
        msgAll.push({
            goodsId:goodsId,
            user:loginUser.name,
            content,
            time:new Date().toLocaleString()
        })
        localStorage.setItem("msg",JSON.stringify(msgAll));
        $("#msg-content").val("");
        renderMsg();
    })
</script>
</body>
</html>
