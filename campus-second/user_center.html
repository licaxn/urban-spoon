<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-5">
    <div class="row">
        <div class="col-md-4 offset-md-4 text-center">
            <div class="card p-4">
                <h3 class="text-main" id="u-name"></h3>
                <p>手机号：<span id="u-phone"></span></p>
                <hr>
                <div class="d-grid gap-3">
                    <a href="my_goods.html" class="btn btn-main">我的发布</a>
                    <a href="my_collect.html" class="btn btn-outline-primary">我的收藏</a>
                    <a href="user_info.html" class="btn btn-outline-primary">修改资料</a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    let loginUser = localStorage.getItem("loginUser") ? JSON.parse(localStorage.getItem("loginUser")) : null;
    if(!loginUser){
        alert("请登录");
        location.href="login.html";
    }
    $("#u-name").text(loginUser.name);
    $("#u-phone").text(loginUser.phone);
</script>
</body>
</html>
