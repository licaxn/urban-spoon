<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册-校园淘</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container">
  <div class="form-box">
    <h3 class="text-center text-main mb-4">新用户注册</h3>
    <div class="mb-3">
      <label class="form-label">用户名</label>
      <input type="text" id="username" class="form-control" placeholder="自定义用户名">
    </div>
    <div class="mb-3">
      <label class="form-label">校园手机号</label>
      <input type="tel" id="phone" class="form-control" placeholder="11位手机号">
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input type="password" id="pwd" class="form-control" placeholder="不少于6位">
    </div>
    <div class="mb-3">
      <label class="form-label">确认密码</label>
      <input type="password" id="repwd" class="form-control">
    </div>
    <button class="btn btn-main w-100 mb-3" id="reg-btn">注册</button>
    <p class="text-center">已有账号？<a href="login.html">去登录</a></p>
  </div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
  $("#reg-btn").click(function(){
    let name = $("#username").val().trim();
    let phone = $("#phone").val().trim();
    let pwd = $("#pwd").val().trim();
    let repwd = $("#repwd").val().trim();
    // 简单校验
    if(!name||!phone||!pwd){
      alert("所有项不能为空！");
      return;
    }
    if(!/^1[3-9]\d{9}$/.test(phone)){
      alert("手机号格式错误");
      return;
    }
    if(pwd.length<6){
      alert("密码至少6位");
      return;
    }
    if(pwd!==repwd){
      alert("两次密码不一致");
      return;
    }
    let userArr = localStorage.getItem("users") ? JSON.parse(localStorage.getItem("users")) : [];
    // 判断用户名重复
    if(userArr.find(u=>u.name===name)){
      alert("用户名已存在");
      return;
    }
    let newUser = {
      id:Date.now(),
      name,phone,pwd,avatar:""
    }
    userArr.push(newUser);
    localStorage.setItem("users",JSON.stringify(userArr));
    alert("注册成功，请登录！");
    location.href="login.html";
  })
</script>
</body>
</html>
