<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部商品-校园淘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-4">
    <div class="row">
        <!-- 侧边分类 -->
        <div class="col-md-3">
            <div class="card p-3">
                <h5 class="text-main">商品分类</h5>
                <div class="d-grid gap-2 mt-3">
                    <a href="goods_list.html" class="btn btn-outline-primary">全部商品</a>
                    <a href="goods_list.html?cate=教材书籍" class="btn btn-outline-primary">教材书籍</a>
                    <a href="goods_list.html?cate=数码电子" class="btn btn-outline-primary">数码电子</a>
                    <a href="goods_list.html?cate=生活用品" class="btn btn-outline-primary">生活用品</a>
                    <a href="goods_list.html?cate=运动器材" class="btn btn-outline-primary">运动器材</a>
                </div>
            </div>
        </div>
        <!-- 商品展示 -->
        <div class="col-md-9">
            <div class="input-group mb-4">
                <input type="text" id="s-key" class="form-control" placeholder="搜索商品">
                <button class="btn btn-main" id="s-btn">搜索</button>
            </div>
            <div class="row" id="goods-box"></div>
        </div>
    </div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    function getUrlParam(key){
        let url = new URL(location.href);
        return url.searchParams.get(key) || "";
    }
    function renderGoods(){
        let cate = getUrlParam("cate");
        let key = getUrlParam("key");
        let list = getGoodsList();
        // 分类筛选
        if(cate) list = list.filter(item=>item.cate===cate);
        // 关键词搜索
        if(key) list = list.filter(item=>item.title.includes(key));
        let html = "";
        if(list.length===0){
            html = "<p class='text-center mt-5'>暂无相关商品</p>";
        }else{
            list.forEach(item=>{
                html += `
                <div class="col-md-4 mb-4">
                    <div class="card goods-card h-100">
                        <img src="${item.img}" height="160">
                        <div class="card-body">
                            <h6>${item.title}</h6>
                            <p class="goods-price">¥${item.price}</p>
                            <span class="badge bg-secondary">${item.cate}</span>
                        </div>
                        <div class="card-footer">
                            <a href="goods_detail.html?id=${item.id}" class="btn btn-sm btn-main w-100">查看详情</a>
                        </div>
                    </div>
                </div>`
            })
        }
        $("#goods-box").html(html);
    }
    renderGoods();
    // 搜索
    $("#s-btn").click(function(){
        let k = $("#s-key").val();
        location.href = `goods_list.html?key=${k}`;
    })
</script>
</body>
</html>
