<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录-校园淘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container">
    <div class="form-box">
        <h3 class="text-center text-main mb-4">用户登录</h3>
        <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" id="username" class="form-control" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" id="pwd" class="form-control" placeholder="请输入密码">
        </div>
        <button class="btn btn-main w-100 mb-3" id="login-btn">登录</button>
        <p class="text-center">没有账号？<a href="register.html">立即注册</a></p>
    </div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    $("#login-btn").click(function(){
        let name = $("#username").val().trim();
        let pwd = $("#pwd").val().trim();
        if(!name || !pwd){
            alert("用户名和密码不能为空！");
            return;
        }
        // 获取用户列表
        let userArr = localStorage.getItem("users") ? JSON.parse(localStorage.getItem("users")) : [];
        let target = userArr.find(u=>u.name===name && u.pwd===pwd);
        if(target){
            localStorage.setItem("loginUser",JSON.stringify(target));
            alert("登录成功！");
            location.href = "index.html";
        }else{
            alert("用户名或密码错误！");
        }
    })
</script>
</body>
</html>
