<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布闲置-校园淘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container">
    <div class="form-box">
        <h3 class="text-center text-main mb-4">发布二手商品</h3>
        <div class="mb-3">
            <label>商品名称</label>
            <input type="text" id="title" class="form-control">
        </div>
        <div class="mb-3">
            <label>商品分类</label>
            <select id="cate" class="form-select">
                <option>教材书籍</option>
                <option>数码电子</option>
                <option>生活用品</option>
                <option>运动器材</option>
            </select>
        </div>
        <div class="mb-3">
            <label>价格</label>
            <input type="number" id="price" class="form-control" min="0">
        </div>
        <div class="mb-3">
            <label>成色</label>
            <select id="quality" class="form-select">
                <option>全新</option>
                <option>95新</option>
                <option>9成新</option>
                <option>8成新</option>
                <option>7成新及以下</option>
            </select>
        </div>
        <div class="mb-3">
            <label>上传图片</label>
            <input type="file" id="img-file" class="form-control" accept="image/*">
            <img id="img-preview" class="mt-3 w-100" style="display:none;">
        </div>
        <div class="mb-3">
            <label>商品描述</label>
            <textarea id="desc" class="form-control" rows="4"></textarea>
        </div>
        <button class="btn btn-main w-100" id="submit-goods">提交发布</button>
    </div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
    let loginUser = localStorage.getItem("loginUser") ? JSON.parse(localStorage.getItem("loginUser")) : null;
    if(!loginUser){
        alert("请先登录！");
        location.href="login.html";
    }
    let imgBase64 = "";
    // 图片预览
    $("#img-file").change(function(e){
        let file = e.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(){
            imgBase64 = reader.result;
            $("#img-preview").attr("src",imgBase64).show();
        }
    })
    // 提交商品
    $("#submit-goods").click(function(){
        let title = $("#title").val().trim();
        let cate = $("#cate").val();
        let price = $("#price").val();
        let quality = $("#quality").val();
        let desc = $("#desc").val().trim();
        if(!title||!price||!desc||!imgBase64){
            alert("请完善所有信息并上传图片！");
            return;
        }
        let goodsArr = getGoodsList();
        let newGoods = {
            id:Date.now(),
            title,cate,price,quality,desc,
            img:imgBase64,
            sellerId:loginUser.id,
            sellerName:loginUser.name
        }
        goodsArr.push(newGoods);
        saveGoodsList(goodsArr);
        alert("发布成功！");
        location.href="my_goods.html";
    })
</script>
</body>
</html>
