<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园淘-首页</title>
  <!-- Bootstrap5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
<header></header>
<main class="container mt-4">
  <!-- 轮播 -->
  <div id="banner" class="carousel slide mb-5" data-bs-ride="carousel">
    <div class="carousel-inner rounded">
      <div class="carousel-item active">
        <img src="https://picsum.photos/id/20/1200/300" class="d-block w-100" alt="闲置教材">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/96/1200/300" class="d-block w-100" alt="数码好物">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/26/1200/300" class="d-block w-100" alt="生活用品">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#banner" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#banner" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- 搜索框 -->
  <div class="row mb-5">
    <div class="col-md-8 offset-md-2">
      <div class="input-group">
        <input type="text" id="search-key" class="form-control" placeholder="搜索教材、数码、生活用品...">
        <button class="btn btn-main" id="search-btn">搜索</button>
      </div>
    </div>
  </div>

  <!-- 分类导航 -->
  <h4 class="text-main mb-3">商品分类</h4>
  <div class="row mb-5">
    <div class="col-md-3 mb-3">
      <a href="goods_list.html?cate=教材" class="btn w-100 py-3 border">📚 教材书籍</a>
    </div>
    <div class="col-md-3 mb-3">
      <a href="goods_list.html?cate=数码" class="btn w-100 py-3 border">📱 数码电子</a>
    </div>
    <div class="col-md-3 mb-3">
      <a href="goods_list.html?cate=生活用品" class="btn w-100 py-3 border">🛏️ 生活用品</a>
    </div>
    <div class="col-md-3 mb-3">
      <a href="goods_list.html?cate=运动器材" class="btn w-100 py-3 border">🏀 运动器材</a>
    </div>
  </div>

  <!-- 最新商品 -->
  <h4 class="text-main mb-3">最新发布</h4>
  <div class="row" id="new-goods"></div>
</main>
<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/common.js"></script>
<script>
  // 渲染首页商品
  function renderIndexGoods(){
    let list = getGoodsList().reverse().slice(0,8);
    let html = "";
    list.forEach(item=>{
      html += `
            <div class="col-md-3 mb-4">
                <div class="card goods-card h-100">
                    <img src="${item.img}" class="card-img-top" height="180">
                    <div class="card-body">
                        <h6 class="card-title">${item.title}</h6>
                        <p class="goods-price">¥${item.price}</p>
                        <span class="badge bg-secondary">${item.cate}</span>
                    </div>
                    <div class="card-footer">
                        <a href="goods_detail.html?id=${item.id}" class="btn btn-sm btn-main w-100">查看详情</a>
                    </div>
                </div>
            </div>`
    })
    $("#new-goods").html(html);
  }
  renderIndexGoods();

  // 搜索跳转
  $("#search-btn").click(function(){
    let key = $("#search-key").val();
    location.href = `goods_list.html?key=${key}`;
  })
</script>
</body>
</html>
